# Verifrog CI — build RTL model and run tests
#
# Caches both the Verilator installation and the per-design build output,
# so most runs only execute the tests.

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Verilator 5+ is required (--public-flat-rw). Ubuntu apt has 4.x,
      # so we build from source and cache the installation.
      - name: Cache Verilator install
        id: cache-verilator
        uses: actions/cache@v4
        with:
          path: /opt/verilator
          key: verilator-stable-v2

      - name: Build Verilator from source
        if: steps.cache-verilator.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git perl python3 make autoconf g++ flex bison ccache libgoogle-perftools-dev numactl perl-doc libfl2 libfl-dev zlib1g zlib1g-dev
          git clone https://github.com/verilator/verilator.git /tmp/verilator
          cd /tmp/verilator
          git checkout stable
          autoconf
          ./configure --prefix=/opt/verilator
          make -j$(nproc)
          make install

      - name: Add Verilator to PATH
        run: |
          echo "/opt/verilator/bin" >> $GITHUB_PATH
          echo "VERILATOR_ROOT=/opt/verilator/share/verilator" >> $GITHUB_ENV

      - name: Verify Verilator
        run: verilator --version

      # Runtime deps for compiling the shim
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y g++ make

      # Cache the per-design simulation library
      - name: Cache simulation build
        uses: actions/cache@v4
        with:
          path: samples/counter/build
          key: sim-counter-${{ hashFiles('samples/counter/rtl/**', 'samples/counter/verifrog.toml', 'src/shim/**') }}

      - name: Build simulation library
        run: bin/verifrog build samples/counter

      - name: Run tests
        run: bin/verifrog test samples/counter --report

      - name: Publish test report
        if: always()
        run: |
          if [ -f samples/counter/test-results.md ]; then
            cat samples/counter/test-results.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No test report generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            samples/counter/test-results.md
            samples/counter/test-results.xml
